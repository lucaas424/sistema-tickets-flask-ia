{% extends "base.html" %}

{% block title %}Iniciar sesión · TicketFlow{% endblock %}

{% block content %}
<section class="auth-wrapper">
    <div class="auth-card">
        <h1>Iniciar sesión</h1>
        <p class="subtitle">Accedé al panel de gestión de tickets de soporte técnico.</p>

        <form method="POST">
            <label>Email</label>
            <input type="email" name="email" placeholder="usuario@empresa.com" required>

            <label>Contraseña</label>
            <input type="password" name="password" placeholder="Ingresá tu contraseña" required>

            <button type="submit" class="btn btn-primary">Ingresar</button>
        </form>

        <p class="form-note">
            ¿No tenés cuenta?
            <a href="{{ url_for('auth.register') }}">Crear cuenta</a>
        </p>
    </div>
</section>
{% endblock %}
